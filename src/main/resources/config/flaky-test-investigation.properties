# FlakyTestInvestigator configuration

# Comma-separated Allure results directories (latest run + optional extras)
agent.flaky.allure.results.directories=target/allure-results
agent.flaky.allure.history.directory=docs/test-history/allure

# Surefire XML reports (current + historical)
agent.flaky.surefire.directory=target/surefire-reports
agent.flaky.surefire.history.directory=docs/test-history/surefire

# Exported GitHub Actions run summaries (JSON) and live gh CLI fetch
agent.flaky.ci.history.directory=docs/ci-history
agent.flaky.github.repository=
agent.flaky.github.workflows=ui-smoke.yml,api-smoke.yml,nightly-regression.yml,pr-validation.yml
agent.flaky.use.gh.cli=true

# Test execution logs for root-cause enrichment
agent.flaky.log.directory=target/logs

agent.flaky.report.output.path=docs/ai-reports/flaky-tests-report.md
agent.flaky.top.n=20
agent.flaky.min.runs=2

agent.flaky.llm.provider=none
