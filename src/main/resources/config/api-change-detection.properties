# ApiChangeDetectionAgent configuration
# OpenAPI URL: leave blank to derive from EnvironmentConfig api.url (strips /api suffix)
agent.openapi.url=
agent.openapi.docs.path=/v3/api-docs

# Snapshot and report paths (relative to project root)
agent.snapshot.directory=docs/api-snapshots
agent.snapshot.filename=openapi-snapshot.json
agent.report.output.path=docs/ai-reports/api-change-report.md

# Test impact mapping (domain -> test class names)
agent.test.mapping.file=classpath:config/test-impact-mapping.properties

# LLM provider: none | openai | claude
agent.llm.provider=none
agent.llm.openai.api.key=
agent.llm.openai.model=gpt-4o
agent.llm.claude.api.key=
agent.llm.claude.model=claude-sonnet-4-20250514

agent.fetch.timeout.ms=30000
agent.save.snapshot.on.run=false
agent.fail.on.breaking.changes=false
