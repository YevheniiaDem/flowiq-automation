# RequirementsTraceabilityAgent configuration

agent.traceability.docs.directory=docs
agent.traceability.test.source.directory=src/test/java
agent.traceability.report.output.path=docs/ai-reports/traceability-matrix.md
agent.traceability.business.impact.file=classpath:config/business-impact.properties
agent.traceability.high.risk.coverage.threshold=50

# Optional offline OpenAPI snapshot
agent.traceability.openapi.snapshot=

# Inherits agent.openapi.* from api-change-detection.properties
agent.llm.provider=none
