# SelfHealingLocatorAgent configuration

agent.selfhealing.report.output.path=docs/ai-reports/self-healing-report.md

# Failure artifacts
agent.selfhealing.allure.results.directories=target/allure-results
agent.selfhealing.dom.snapshot.directory=docs/test-history/dom
agent.selfhealing.screenshot.directory=target/screenshots

# Similarity thresholds for confidence mapping (0.0 - 1.0)
agent.selfhealing.confidence.high.threshold=0.85
agent.selfhealing.confidence.medium.threshold=0.60

# LLM enrichment (optional): none | openai | claude
agent.selfhealing.llm.provider=none
