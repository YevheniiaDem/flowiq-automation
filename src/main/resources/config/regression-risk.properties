# RiskBasedRegressionAgent configuration

agent.regressionrisk.report.output.path=docs/ai-reports/regression-risk-report.md
agent.regressionrisk.git.base.ref=main
agent.regressionrisk.use.git.diff=true
agent.regressionrisk.changed.files.manifest=
agent.regressionrisk.openapi.snapshot=

# Estimated minutes per test class by suite (for execution time projection)
agent.regressionrisk.minutes.smoke=2
agent.regressionrisk.minutes.contract=3
agent.regressionrisk.minutes.regression=8
agent.regressionrisk.minutes.ui=5

# Thresholds for overall regression scope recommendation
agent.regressionrisk.full.regression.critical.modules=1
agent.regressionrisk.partial.regression.high.modules=2
