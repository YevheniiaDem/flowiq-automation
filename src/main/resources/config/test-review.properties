# TestReviewAgent configuration

agent.review.report.output.path=docs/ai-reports/test-review-report.md
agent.review.git.base.ref=main
agent.review.use.git.diff=true
agent.review.changed.files.manifest=
agent.review.openapi.snapshot=
agent.review.test.source.directory=src/test/java

# Verdict thresholds
agent.review.reject.if.no.regression=true
agent.review.reject.if.no.contract.on.new.endpoint=true
