# TestGapAnalyzerAgent configuration
agent.gap.test.source.directory=src/test/java
agent.gap.report.output.path=docs/ai-reports/test-gap-analysis.md
agent.gap.business.impact.file=classpath:config/business-impact.properties

# Optional: load OpenAPI from file instead of live fetch (useful for offline/CI)
agent.gap.openapi.snapshot=

# Inherits OpenAPI URL settings from api-change-detection.properties
agent.llm.provider=none
