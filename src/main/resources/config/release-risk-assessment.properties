# ReleaseRiskAssessmentAgent configuration

agent.release.report.output.path=docs/ai-reports/release-readiness-report.md

# Test execution sources (Surefire XML + optional Allure)
agent.release.surefire.directory=target/surefire-reports
agent.release.surefire.history.directory=docs/test-history/surefire
agent.release.allure.results.directories=target/allure-results

# AI agent reports consumed as inputs
agent.release.flaky.report.path=docs/ai-reports/flaky-tests-report.md
agent.release.api.change.report.path=docs/ai-reports/api-change-report.md

# Risk score thresholds (0-100, higher = more risk)
agent.release.score.green.max=25
agent.release.score.yellow.max=60

# Component weights (relative contribution to risk score)
agent.release.weight.regression=35
agent.release.weight.smoke=30
agent.release.weight.contract=20
agent.release.weight.flaky=10
agent.release.weight.api.change=5

# Gate thresholds
agent.release.gate.regression.min.pass.rate=90
agent.release.gate.smoke.min.pass.rate=95
agent.release.gate.contract.min.pass.rate=100
