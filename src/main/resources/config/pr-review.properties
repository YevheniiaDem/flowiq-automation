# PullRequestReviewAgent configuration

agent.prreview.report.output.path=docs/ai-reports/pr-review-report.md
agent.prreview.git.base.ref=main
agent.prreview.use.git.diff=true
agent.prreview.changed.files.manifest=
agent.prreview.openapi.snapshot=
agent.prreview.main.source.directory=src/main/java
agent.prreview.test.source.directory=src/test/java
agent.prreview.schema.directory=src/test/resources/schemas
agent.prreview.page.object.directory=src/main/java/com/flowiq/pages

agent.prreview.reject.if.no.contract.on.new.endpoint=true
agent.prreview.reject.if.no.regression=true
