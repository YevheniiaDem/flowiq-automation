name: Generate and upload Allure report
description: Builds Allure HTML report from allure-results and uploads artifacts

inputs:
  artifact-prefix:
    description: Prefix for uploaded artifact names
    required: true
  retention-days:
    description: Artifact retention in days
    required: false
    default: '14'
  working-directory:
    description: Maven project directory
    required: false
    default: '.'
  results-directory:
    description: Allure results directory
    required: false
    default: target/allure-results
  report-directory:
    description: Generated Allure HTML report directory
    required: false
    default: target/site/allure-maven-plugin

runs:
  using: composite
  steps:
    - name: Generate Allure report
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mvn allure:report -B \
          -Dallure.results.directory="${{ inputs.results-directory }}" \
          -Dproject.build.directory="$(dirname "${{ inputs.results-directory }}")" || true

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-prefix }}-allure-results
        path: ${{ inputs.results-directory }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: warn

    - name: Upload Allure HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-prefix }}-allure-report
        path: ${{ inputs.report-directory }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: warn
