name: Generate and upload Allure report
description: Builds Allure HTML report from target/allure-results and uploads artifacts

inputs:
  artifact-prefix:
    description: Prefix for uploaded artifact names
    required: true
  retention-days:
    description: Artifact retention in days
    required: false
    default: '14'
  working-directory:
    description: Maven project directory
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Generate Allure report
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: mvn allure:report -B

    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-prefix }}-allure-results
        path: ${{ inputs.working-directory }}/target/allure-results
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: warn

    - name: Upload Allure HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-prefix }}-allure-report
        path: ${{ inputs.working-directory }}/target/site/allure-maven-plugin
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: warn
