name: Setup CI test runner
description: Java, Maven cache, and optional Playwright for ephemeral CI test jobs

inputs:
  java-version:
    description: Java version
    required: false
    default: '17'
  install-playwright:
    description: Install Playwright Chromium with system deps
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Java and Maven cache
      uses: ./.github/actions/setup-java-maven
      with:
        java-version: ${{ inputs.java-version }}

    - name: Cache Playwright browsers
      if: inputs.install-playwright == 'true'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pom.xml') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright Chromium
      if: inputs.install-playwright == 'true'
      shell: bash
      run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium" -B
