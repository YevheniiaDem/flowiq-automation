name: Nightly Regression

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: stage
        type: choice
        options:
          - stage
          - dev

jobs:
  regression:
    name: Regression (${{ github.event.inputs.environment || 'stage' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          missing=0
          if [ -z "$TEST_USER_EMAIL" ]; then
            echo "::error::GitHub secret TEST_USER_EMAIL is not configured."
            echo "Add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ -z "$TEST_USER_PASSWORD" ]; then
            echo "::error::GitHub secret TEST_USER_PASSWORD is not configured."
            echo "Add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Secrets validation passed."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Run regression suite
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: mvn test -Pregression -Denv=${{ github.event.inputs.environment || 'stage' }} -B

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-allure-results
          path: target/allure-results
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-surefire-reports
          path: target/surefire-reports
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-traces
          path: target/traces
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-logs
          path: target/logs
          retention-days: 14
          if-no-files-found: warn

      - name: Regression summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Nightly regression completed successfully."
          else
            echo "::warning::Nightly regression reported failures. This scheduled job does not block PRs or pushes."
          fi
