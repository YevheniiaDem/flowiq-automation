name: Nightly Regression

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: stage
        type: choice
        options:
          - stage
          - dev

concurrency:
  group: nightly-regression-${{ github.event.inputs.environment || 'stage' }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '--batch-mode --fail-at-end -Dstyle.color=always'
  TARGET_ENV: ${{ github.event.inputs.environment || 'stage' }}
  ALLURE_RETENTION_DAYS: '30'

jobs:
  nightly-regression:
    name: Nightly Regression (${{ github.event.inputs.environment || 'stage' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ github.event.inputs.environment || 'stage' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        uses: ./.github/actions/validate-test-secrets
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Setup Java and Maven cache
        uses: ./.github/actions/setup-java-maven
        with:
          java-version: ${{ env.JAVA_VERSION }}

      - name: Run API regression suite
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: mvn test -Papi-regression -Denv=${{ env.TARGET_ENV }} -B

      - name: Run contract tests
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: mvn test -Pcontract -Denv=${{ env.TARGET_ENV }} -B

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-surefire-${{ env.TARGET_ENV }}-${{ github.run_number }}
          path: target/surefire-reports
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs-${{ env.TARGET_ENV }}-${{ github.run_number }}
          path: target/logs
          retention-days: 14
          if-no-files-found: warn

      - name: Generate and upload Allure report
        if: always()
        uses: ./.github/actions/generate-allure-report
        with:
          artifact-prefix: nightly-regression-${{ env.TARGET_ENV }}-${{ github.run_number }}
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}

      - name: Regression summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Nightly regression completed successfully for environment '${{ env.TARGET_ENV }}'."
          else
            echo "::warning::Nightly regression failed for environment '${{ env.TARGET_ENV }}'. Review Allure and Surefire artifacts."
            exit 1
          fi
