name: PR Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: pr-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '--batch-mode --fail-at-end -Dstyle.color=always'
  BACKEND_REPOSITORY: ${{ vars.BACKEND_REPOSITORY || 'YevheniiaDem/flowiq-backend' }}
  BACKEND_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
  ALLURE_RETENTION_DAYS: '7'

jobs:
  compile:
    name: Compile automation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout automation
        uses: actions/checkout@v4

      - name: Setup Java and Maven cache
        uses: ./.github/actions/setup-java-maven
        with:
          java-version: ${{ env.JAVA_VERSION }}

      - name: Compile sources and test sources
        run: mvn clean compile test-compile -B

      - name: Upload compile logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-compile-logs
          path: |
            **/target/surefire-reports
            **/target/maven-status
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: ignore

  unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          ref: ${{ env.BACKEND_REF }}
          path: flowiq-backend
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Java and Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        working-directory: flowiq-backend
        run: mvn test -Dtest=com.flowiq.unit.** -B

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-unit-surefire-reports
          path: flowiq-backend/target/surefire-reports
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-unit-jacoco-report
          path: flowiq-backend/target/site/jacoco
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

  contract-tests:
    name: Contract tests
    runs-on: ubuntu-latest
    needs: compile
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: flowiq
          POSTGRES_USER: flowiq
          POSTGRES_PASSWORD: flowiq123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowiq -d flowiq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/flowiq
      SPRING_DATASOURCE_USERNAME: flowiq
      SPRING_DATASOURCE_PASSWORD: flowiq123

    steps:
      - name: Checkout automation
        uses: actions/checkout@v4

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          ref: ${{ env.BACKEND_REF }}
          path: flowiq-backend
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Java and Maven cache
        uses: ./.github/actions/setup-java-maven
        with:
          java-version: ${{ env.JAVA_VERSION }}

      - name: Make CI scripts executable
        run: chmod +x .github/scripts/*.sh

      - name: Start backend
        run: .github/scripts/start-backend-ci.sh flowiq-backend backend.log backend.pid

      - name: Wait for backend health
        run: .github/scripts/wait-for-backend.sh http://localhost:8080/api/health 60 5

      - name: Run contract tests
        run: mvn test -Pcontract -Denv=local -B

      - name: Stop backend
        if: always()
        run: .github/scripts/stop-backend-ci.sh backend.pid

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-contract-backend-log
          path: backend.log
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-contract-surefire-reports
          path: target/surefire-reports
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-contract-allure-results
          path: target/allure-results
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

  pr-validation:
    name: PR Validation gate
    runs-on: ubuntu-latest
    needs: [compile, unit-tests, contract-tests]
    if: always()

    steps:
      - name: Evaluate required jobs
        run: |
          compile="${{ needs.compile.result }}"
          unit="${{ needs.unit-tests.result }}"
          contract="${{ needs.contract-tests.result }}"

          echo "compile=${compile}"
          echo "unit-tests=${unit}"
          echo "contract-tests=${contract}"

          if [ "$compile" != "success" ] || [ "$unit" != "success" ] || [ "$contract" != "success" ]; then
            echo "::error::PR validation failed. All jobs must succeed."
            exit 1
          fi

          echo "PR validation passed."
