name: UI Smoke

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: stage
        type: choice
        options:
          - stage
          - dev

concurrency:
  group: ui-smoke-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '--batch-mode --fail-at-end -Dstyle.color=always'
  TARGET_ENV: ${{ inputs.environment }}
  PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
  ALLURE_RETENTION_DAYS: '14'

jobs:
  ui-smoke:
    name: UI Smoke (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        uses: ./.github/actions/validate-test-secrets
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Setup Java and Maven cache
        uses: ./.github/actions/setup-java-maven
        with:
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium" -B

      - name: Run UI smoke tests
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: mvn test -Pui-smoke -Denv=${{ env.TARGET_ENV }} -B

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-surefire-${{ inputs.environment }}-${{ github.run_number }}
          path: target/surefire-reports
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-traces-${{ inputs.environment }}-${{ github.run_number }}
          path: target/traces
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-screenshots-${{ inputs.environment }}-${{ github.run_number }}
          path: |
            target/screenshots
            target/test-output
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-videos-${{ inputs.environment }}-${{ github.run_number }}
          path: |
            target/videos
            test-results
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-logs-${{ inputs.environment }}-${{ github.run_number }}
          path: target/logs
          retention-days: 7
          if-no-files-found: warn

      - name: Generate and upload Allure report
        if: always()
        uses: ./.github/actions/generate-allure-report
        with:
          artifact-prefix: ui-smoke-${{ inputs.environment }}-${{ github.run_number }}
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
