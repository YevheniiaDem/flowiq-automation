name: API Smoke

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: stage
        type: choice
        options:
          - stage
          - dev

concurrency:
  group: api-smoke-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Dstyle.color=always'
  TARGET_ENV: ${{ inputs.environment }}
  ALLURE_RETENTION_DAYS: '14'

jobs:
  api-smoke:
    name: API Smoke (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        uses: ./.github/actions/validate-test-secrets
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Setup Java and Maven cache
        uses: ./.github/actions/setup-java-maven
        with:
          java-version: ${{ env.JAVA_VERSION }}

      - name: Run API smoke tests
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: mvn test -Papi-smoke -Denv=${{ env.TARGET_ENV }} -B --fail-at-end

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-surefire-${{ inputs.environment }}-${{ github.run_number }}
          path: target/surefire-reports
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
          if-no-files-found: warn

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-logs-${{ inputs.environment }}-${{ github.run_number }}
          path: target/logs
          retention-days: 7
          if-no-files-found: warn

      - name: Generate and upload Allure report
        if: always()
        uses: ./.github/actions/generate-allure-report
        with:
          artifact-prefix: api-smoke-${{ inputs.environment }}-${{ github.run_number }}
          retention-days: ${{ env.ALLURE_RETENTION_DAYS }}
