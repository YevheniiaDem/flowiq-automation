name: API Smoke

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: stage
        type: choice
        options:
          - stage
          - dev

jobs:
  api-smoke:
    name: API Smoke (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          missing=0
          if [ -z "$TEST_USER_EMAIL" ]; then
            echo "::error::GitHub secret TEST_USER_EMAIL is not configured."
            echo "Add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ -z "$TEST_USER_PASSWORD" ]; then
            echo "::error::GitHub secret TEST_USER_PASSWORD is not configured."
            echo "Add it under Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Secrets validation passed."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run API smoke tests
        env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: mvn test -Papi-smoke -Denv=${{ inputs.environment }} -B

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-allure-results-${{ inputs.environment }}
          path: target/allure-results
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-surefire-reports-${{ inputs.environment }}
          path: target/surefire-reports
          retention-days: 14
          if-no-files-found: warn

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-logs-${{ inputs.environment }}
          path: target/logs
          retention-days: 7
          if-no-files-found: warn
